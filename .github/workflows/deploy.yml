name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Ensure Pages Site Exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          repo="${GITHUB_REPOSITORY}"
          api="https://api.github.com/repos/${repo}/pages"

          status=$(curl -s -o /tmp/pages_resp.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api}")

          if [ "${status}" = "404" ]; then
            echo "Pages site missing, creating with build_type=workflow"
            create_status=$(curl -s -o /tmp/pages_create.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api}" \
              -d '{"build_type":"workflow"}')

            if [ "${create_status}" != "201" ] && [ "${create_status}" != "409" ]; then
              echo "Failed to create Pages site (status ${create_status})"
              cat /tmp/pages_create.json
              exit 1
            fi
          elif [ "${status}" != "200" ]; then
            echo "Unexpected status while checking Pages site: ${status}"
            cat /tmp/pages_resp.json
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
